<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>REALSHIFT · Xavi Morros</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --negro: #0D0D0D;
    --blanco: #FFFFFF;
    --rojo: #C0392B;
    --rojo-clr: #FDECEA;
    --verde: #1A6B3C;
    --verde-clr: #EAF5EE;
    --naranja: #B8520A;
    --naranja-clr: #FDF3EA;
    --azul: #1A3A6B;
    --azul-clr: #EAF0F8;
    --gris1: #1C1C1C;
    --gris2: #6B6B6B;
    --gris3: #F2F2F2;
    --amarillo: #FFF9C4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--negro);
    color: var(--blanco);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--negro);
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid #222;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--blanco);
  }
  .brand span { color: var(--rojo); }
  .cliente-info {
    text-align: right;
    font-size: 11px;
    color: var(--gris2);
    line-height: 1.4;
  }
  .cliente-info strong { color: #aaa; font-size: 12px; }

  /* ── NAV DIAS ── */
  .nav-dias {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: none;
  }
  .nav-dias::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    padding: 7px 14px;
    border: none;
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    background: #222;
    color: #777;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .nav-btn.active-lunes   { background: var(--rojo);    color: #fff; }
  .nav-btn.active-mierco  { background: var(--rojo);    color: #fff; }
  .nav-btn.active-viernes { background: var(--rojo);    color: #fff; }
  .nav-btn.active-martes  { background: var(--verde);   color: #fff; }
  .nav-btn.active-jueves  { background: var(--verde);   color: #fff; }
  .nav-btn.active-sabado  { background: var(--naranja); color: #fff; }
  .nav-btn.active-domingo { background: var(--azul);    color: #fff; }

  /* ── CONTENIDO ── */
  .contenido { padding: 16px; }

  /* Banner sesión */
  .banner-sesion {
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .banner-sesion.entreno    { background: var(--rojo); }
  .banner-sesion.descanso   { background: var(--verde); }
  .banner-sesion.descanso2  { background: var(--naranja); }
  .banner-sesion.libre      { background: var(--azul); }

  .banner-left h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .banner-left p {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .banner-right {
    text-align: right;
    font-size: 11px;
    opacity: 0.85;
    line-height: 1.6;
  }
  .badge-estimulo {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 10px;
    font-weight: 700;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* ── CALENTAMIENTO ── */
  .calentamiento {
    background: var(--azul-clr);
    border-left: 3px solid var(--azul);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--azul);
    font-weight: 500;
  }
  .calentamiento strong { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── TARJETAS EJERCICIO ── */
  .ejercicio-card {
    background: #161616;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
    border: 1px solid #2a2a2a;
  }
  .card-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
  }
  .card-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .card-title {
    flex: 1;
    font-size: 14px;
    font-weight: 600;
  }
  .card-arrow {
    font-size: 14px;
    color: #555;
    transition: transform 0.3s;
  }
  .card-arrow.open { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 14px 14px;
  }
  .card-body.open { display: block; }

  .gif-container {
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
    background: #0a0a0a;
    text-align: center;
  }
  .gif-container img {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    display: block;
  }

  /* Pills series/reps/rpe */
  .pills-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .pill {
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 64px;
  }
  .pill-label {
    font-size: 9px;
    font-weight: 500;
    opacity: 0.7;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .pill-val { font-size: 15px; line-height: 1.2; }
  .pill.series  { background: var(--azul-clr); color: var(--azul); }
  .pill.reps    { background: var(--azul-clr); color: var(--azul); }
  .pill.rpe     { background: #222; color: #aaa; }
  .pill.descanso{ background: #222; color: #aaa; }

  .nota-bio {
    background: #0f0f0f;
    border-left: 2px solid #333;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 11px;
    color: #888;
    font-style: italic;
    line-height: 1.5;
  }

  /* Control de cargas */
  .cargas-section {
    margin-top: 10px;
  }
  .cargas-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #555;
    margin-bottom: 8px;
  }
  .cargas-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
  }
  .carga-sem {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .carga-sem-label {
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    color: #444;
    text-transform: uppercase;
  }
  .carga-input {
    width: 100%;
    background: #FFF9C4;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 5px 4px;
    font-size: 12px;
    font-weight: 700;
    text-align: center;
    color: var(--negro);
    font-family: 'DM Sans', sans-serif;
  }
  .rpe-input {
    width: 100%;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 5px 4px;
    font-size: 11px;
    text-align: center;
    color: #aaa;
    font-family: 'DM Sans', sans-serif;
  }
  .carga-input:focus, .rpe-input:focus {
    outline: none;
    border-color: var(--rojo);
  }

  /* Dia descanso / padel */
  .descanso-card {
    background: #161616;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid #2a2a2a;
  }
  .descanso-icon { font-size: 48px; margin-bottom: 12px; }
  .descanso-card h2 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: #aaa; letter-spacing: 2px; }
  .descanso-card p { font-size: 13px; color: var(--gris2); margin-top: 8px; line-height: 1.6; }

  /* Footer */
  .footer-guardar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background: rgba(13,13,13,0.95);
    border-top: 1px solid #222;
    backdrop-filter: blur(8px);
  }
  .btn-guardar {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--verde);
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  .btn-guardar:active { opacity: 0.8; }

  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--verde);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  .semana-selector {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    background: #161616;
    border-radius: 10px;
    padding: 10px 14px;
  }
  .semana-selector label { font-size: 12px; color: #888; font-weight: 600; }
  .semana-selector select {
    flex: 1;
    background: #222;
    color: #fff;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 6px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
  }

  .pb-safe { padding-bottom: 80px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-top">
    <div class="brand">REAL<span>SHIFT</span></div>
    <div class="cliente-info">

    </div>
  </div>
  <div class="nav-dias" id="nav-dias"></div>
</div>

<div class="contenido pb-safe" id="contenido"></div>

<div class="footer-guardar">
  <button class="btn-guardar" onclick="guardarSesion()">✓ Guardar sesión</button>
</div>

<div class="toast" id="toast">✓ Cargas guardadas</div>

const SEMANAS = ["S1","S2","S3","S4","S5","S6"];
const DIAS_ORDER = ["lunes","martes","mierco","jueves","viernes","sabado","domingo"];
const DIA_LABELS = { lunes:"LUN", martes:"MAR", mierco:"MIÉ", jueves:"JUE", viernes:"VIE", sabado:"SÁB", domingo:"DOM" };


let diaActivo = "lunes";
let semanaActiva = 1;

function cargarDatos() {
  const raw = localStorage.getItem("realshift_xavi");
  return raw ? JSON.parse(raw) : {};
}
function guardarDatos(datos) {
  localStorage.setItem("realshift_xavi", JSON.stringify(datos));
}
function keyInput(dia, semana, exId, tipo) {
  return `${dia}_s${semana}_${exId}_${tipo}`;
}

function renderNav() {
  const nav = document.getElementById("nav-dias");
  nav.innerHTML = DIAS_ORDER.map(dia => {
    const s = SESIONES[dia];
    const activeClass = diaActivo === dia ? `active-${dia === "mierco" ? "mierco" : dia}` : "";
    return `<button class="nav-btn ${activeClass}" onclick="cambiarDia('${dia}')">${DIA_LABELS[dia]}</button>`;
  }).join("");
}

function cambiarDia(dia) {
  diaActivo = dia;
  renderNav();
  renderContenido();
}

function renderContenido() {
  const s = SESIONES[diaActivo];
  const datos = cargarDatos();
  const cont = document.getElementById("contenido");

  if (s.tipo !== "entreno") {
    let bgClass = s.tipo;
    cont.innerHTML = `
      <div class="banner-sesion ${s.tipo}" style="background:${s.color}">
        <div class="banner-left">
          <h1>${s.nombre}</h1>
          <p>${s.tipo === "libre" ? "DESCANSO COMPLETO" : "DESCANSO / PÁDEL"}</p>
        </div>
      </div>
      <div class="descanso-card">
        <div class="descanso-icon">${s.icono}</div>
        <h2>${s.tipo === "libre" ? "RECUPERACIÓN" : "ACTIVO"}</h2>
        <p>${s.texto}</p>
      </div>
    `;
    return;
  }

  let html = `
    <div class="banner-sesion entreno" style="background:${s.color}">
      <div class="banner-left">
        <h1>${s.nombre}</h1>
        <p>${s.titulo}</p>
        <span class="badge-estimulo">${s.estimulo}</span>
      </div>
      <div class="banner-right">
        <div>${s.series} series · ${s.reps} reps</div>
        <div>RPE ${s.rpe}</div>
        <div>Descanso ${s.descanso}</div>
      </div>
    </div>

    <div class="semana-selector">
      <label>SEMANA</label>
      <select id="sel-semana" onchange="cambiarSemana(this.value)">
        ${SEMANAS.map((sm, i) => `<option value="${i+1}" ${semanaActiva===i+1?"selected":""}>${sm} — Semana ${i+1}</option>`).join("")}
      </select>
    </div>

    <div class="calentamiento">
      <strong>⚡ Calentamiento</strong><br>${s.calentamiento}
    </div>
  `;

  s.ejercicios.forEach((ex, idx) => {
    const ser = ex.series || s.series;
    const rep = ex.reps   || s.reps;
    const rpe = ex.rpe    || s.rpe;

    let cargas_html = `<div class="cargas-section">
      <div class="cargas-title">Control de cargas · Semana ${semanaActiva}</div>
      <div class="cargas-grid">`;

    SEMANAS.forEach((sm, si) => {
      const kkg  = keyInput(diaActivo, si+1, ex.id, "kg");
      const krpe = keyInput(diaActivo, si+1, ex.id, "rpe");
      const vkg  = datos[kkg]  || "";
      const vrpe = datos[krpe] || "";
      cargas_html += `
        <div class="carga-sem">
          <div class="carga-sem-label">${sm}</div>
          <input class="carga-input" type="number" placeholder="kg" value="${vkg}"
            oninput="saveInput('${kkg}', this.value)" inputmode="decimal" step="0.5">
          <input class="rpe-input" type="number" placeholder="RPE" min="1" max="10" value="${vrpe}"
            oninput="saveInput('${krpe}', this.value)" inputmode="decimal" step="0.5">
        </div>`;
    });
    cargas_html += `</div></div>`;

    html += `
    <div class="ejercicio-card">
      <div class="card-header" onclick="toggleCard(${idx})" id="hdr-${idx}">
        <div class="card-num" style="background:${s.color}20;color:${s.color}">${idx+1}</div>
        <div class="card-title">${ex.nombre}</div>
        <div class="card-arrow" id="arr-${idx}">▼</div>
      </div>
      <div class="card-body" id="body-${idx}">
        <div class="gif-container">
          <img src="${GIFS[ex.gif] || ''}" alt="${ex.nombre}" loading="lazy">
        </div>
        <div class="pills-row">
          <div class="pill series"><span class="pill-label">Series</span><span class="pill-val">${ser}</span></div>
          <div class="pill reps"><span class="pill-label">Reps</span><span class="pill-val">${rep}</span></div>
          <div class="pill rpe"><span class="pill-label">RPE obj.</span><span class="pill-val">${rpe}</span></div>
          <div class="pill descanso"><span class="pill-label">Descanso</span><span class="pill-val">${s.descanso}</span></div>
        </div>
        <div class="nota-bio">${ex.nota}</div>
        ${cargas_html}
      </div>
    </div>`;
  });

  cont.innerHTML = html;
}

function toggleCard(idx) {
  const body = document.getElementById(`body-${idx}`);
  const arr  = document.getElementById(`arr-${idx}`);
  body.classList.toggle("open");
  arr.classList.toggle("open");
}

function cambiarSemana(val) {
  semanaActiva = parseInt(val);
  renderContenido();
}

function saveInput(key, val) {
  const datos = cargarDatos();
  datos[key] = val;
  guardarDatos(datos);
}

function guardarSesion() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

// Init
renderNav();
renderContenido();

</script>
